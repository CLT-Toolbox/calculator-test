<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator Panel</title>

    <!-- CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --surface: #ffffff;
            --surface-soft: #f6f8fb;
            --ink: #152033;
            --muted: #667085;
            --line: #e4e7ec;
            --brand: #2563eb;
            --brand-soft: #e8f0ff;
            --wood-0: #d18b45;
            --wood-90: #6f9f72;
        }

        body {
            min-height: 100vh;
            color: var(--ink);
            background:
                radial-gradient(circle at top left, rgba(37, 99, 235, 0.16), transparent 32rem),
                linear-gradient(135deg, #f8fafc 0%, #edf2f7 100%);
        }

        .app-shell {
            width: min(100% - 1.5rem, 1360px);
            max-width: none;
        }

        .hero {
            padding: 2rem;
            border: 1px solid rgba(255, 255, 255, 0.8);
            border-radius: 28px;
            background: rgba(255, 255, 255, 0.74);
            box-shadow: 0 24px 70px rgba(15, 23, 42, 0.08);
            backdrop-filter: blur(16px);
        }

        .eyebrow {
            color: var(--brand);
            font-size: 0.78rem;
            font-weight: 700;
            letter-spacing: 0.12em;
            text-transform: uppercase;
        }

        .panel-card {
            width: 100%;
            max-width: 100%;
            overflow: hidden;
            border: 1px solid rgba(228, 231, 236, 0.9);
            border-radius: 24px;
            background: var(--surface);
            box-shadow: 0 18px 50px rgba(15, 23, 42, 0.07);
        }

        .table-responsive {
            width: 100%;
        }

        .workspace-grid {
            display: grid;
            grid-template-columns: minmax(300px, 380px) minmax(0, 1fr);
            gap: 1.5rem;
            align-items: start;
        }

        .workspace-grid > *,
        .result-grid > * {
            min-width: 0;
        }

        .result-grid {
            display: grid;
            grid-template-columns: minmax(300px, 0.95fr) minmax(360px, 1.2fr);
            gap: 1.5rem;
            align-items: start;
        }

        .detail-card {
            grid-column: 1 / -1;
        }

        #output {
            display: contents;
        }

        .input-card {
            position: sticky;
            top: 1rem;
            width: 100%;
        }

        .form-label {
            color: #344054;
            font-size: 0.84rem;
            font-weight: 700;
        }

        .form-control,
        .form-select {
            border-color: var(--line);
            border-radius: 14px;
            padding: 0.72rem 0.9rem;
        }

        .form-control:focus,
        .form-select:focus {
            border-color: var(--brand);
            box-shadow: 0 0 0 0.22rem rgba(37, 99, 235, 0.12);
        }

        .btn-primary {
            border: 0;
            border-radius: 14px;
            background: linear-gradient(135deg, #2563eb, #1d4ed8);
            box-shadow: 0 12px 28px rgba(37, 99, 235, 0.28);
        }

        .metric-card {
            border: 1px solid #dbe7ff;
            border-radius: 24px;
            background: linear-gradient(135deg, #ffffff, #eef5ff);
        }

        .metric-value {
            font-size: clamp(1.45rem, 3vw, 2.5rem);
            font-weight: 800;
            letter-spacing: -0.04em;
        }

        .method-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            padding: 0.42rem 0.7rem;
            border-radius: 999px;
            color: #1d4ed8;
            background: var(--brand-soft);
            font-weight: 700;
            font-size: 0.8rem;
        }

        .layer-stack {
            display: grid;
            gap: 0.55rem;
        }

        .layer-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            min-height: 44px;
            padding: 0 0.95rem;
            border-radius: 14px;
            color: #1f2937;
            font-weight: 700;
            box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.55);
        }

        .layer-0 {
            background: linear-gradient(90deg, #f2bd7d, var(--wood-0));
        }

        .layer-90 {
            background: linear-gradient(90deg, #a9d8a7, var(--wood-90));
        }

        .table {
            --bs-table-bg: transparent;
        }

        .table thead th {
            color: #475467;
            background: var(--surface-soft);
            font-size: 0.78rem;
            text-transform: uppercase;
            white-space: nowrap;
        }

        .table td {
            white-space: nowrap;
        }

        .number-cell {
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
            font-size: 0.86rem;
        }

        .text-muted-custom {
            color: var(--muted);
        }

        @media (min-width: 1200px) {
            .hero {
                padding: 2.5rem;
            }

            .metric-card,
            .panel-card {
                border-radius: 28px;
            }
        }

        @media (max-width: 991.98px) {
            .app-shell {
                width: min(100% - 1.25rem, 820px);
            }

            .workspace-grid {
                grid-template-columns: 1fr;
            }

            .result-grid {
                grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
            }

            .input-card {
                display: grid;
                grid-template-columns: repeat(2, minmax(0, 1fr));
                gap: 1rem;
            }

            .input-card > .d-flex,
            .input-card > .btn {
                grid-column: 1 / -1;
            }

            .input-card > .mb-3 {
                margin-bottom: 0 !important;
            }

            .input-card {
                position: static;
            }

            .hero {
                padding: 1.4rem;
                border-radius: 22px;
            }
        }

        @media (max-width: 575.98px) {
            .app-shell {
                width: min(100% - 1rem, 100%);
            }

            .result-grid,
            .input-card {
                grid-template-columns: 1fr;
            }

            .hero,
            .panel-card,
            .metric-card {
                border-radius: 18px;
            }

            .hero,
            .panel-card,
            .metric-card,
            .input-card {
                padding: 1.1rem !important;
            }

            .layer-bar {
                align-items: flex-start;
                flex-direction: column;
                justify-content: center;
                gap: 0.15rem;
                min-height: 56px;
            }
        }
    </style>
</head>
<body>
    <div class="container-fluid app-shell py-4 py-lg-5">
        <header class="hero mb-4 mb-lg-5">
            <div class="row align-items-end g-3">
                <div class="col-lg-8">
                    <div class="eyebrow mb-2">Floor Panel Properties</div>
                    <h1 class="display-6 fw-bold mb-3">CLT Floor Panel Calculator</h1>
                    <p class="lead text-muted-custom mb-0">Calculate CLT layup stiffness with Shear Analogy or Gamma method based on the provided Excel workbook.</p>
                </div>
                <div class="col-lg-4 text-lg-end">
                    <span class="method-badge">0&deg; / 90&deg; layup</span>
                </div>
            </div>
        </header>

        <div class="workspace-grid">
            <div>
                <form id="calculatorForm" class="panel-card input-card p-4">
                    <div class="d-flex align-items-start justify-content-between gap-3 mb-4">
                        <div>
                            <div class="eyebrow mb-1">Input</div>
                            <h2 class="h4 fw-bold mb-1">Panel Setup</h2>
                            <p id="methodHelp" class="small text-muted-custom mb-0">Shear Analogy supports 3-9 symmetric layers.</p>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="method" class="form-label">Analytical Method</label>
                        <select id="method" class="form-select">
                            <option value="shear">Shear Analogy</option>
                            <option value="gamma">Gamma</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label for="grade" class="form-label">Grade</label>
                        <select id="grade" class="form-select"></select>
                    </div>

                    <div class="mb-3">
                        <label for="layerCount" class="form-label">Total Layers</label>
                        <input id="layerCount" class="form-control" type="number" min="3" max="9" step="1" value="5">
                    </div>

                    <div class="mb-3">
                        <label for="thickness" class="form-label">Thickness Each Layer (mm)</label>
                        <input id="thickness" class="form-control" type="number" min="1" step="0.01" value="35">
                    </div>

                    <div class="mb-3">
                        <label for="length" class="form-label">Length (m)</label>
                        <input id="length" class="form-control" type="number" min="0.1" step="0.01" value="5">
                    </div>

                    <div class="mb-3">
                        <label for="effectiveWidth" class="form-label">beff (mm)</label>
                        <input id="effectiveWidth" class="form-control" type="number" min="1" step="0.01" value="1000">
                    </div>

                    <button class="btn btn-primary w-100 py-3 fw-bold" type="submit">Calculate Panel</button>
                </form>
            </div>

            <div>
                <div id="alert"></div>
                <div id="resultGrid" class="result-grid">
                    <div id="layerPreview"></div>
                    <div id="output"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Script -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="type/material-grade-type.js"></script>
    <script src="type/clt-layer-type.js"></script>
    <script src="type/clt-layer-properties-type.js"></script>
    <script src="type/clt-layup-type.js"></script>
    <script src="type/panel-properties-type.js"></script>
    <script src="calculation/panel-properties.js"></script>
    <script src="calculator.js"></script>
</body>
</html>
