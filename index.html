<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator Panel CLT</title>
    <!-- CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; font-family: 'Inter', sans-serif; }
        .card { border-radius: 12px; border: none; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .table th { background-color: #e9ecef; }
        .result-highlight { font-size: 1.25rem; font-weight: bold; color: #198754; }
    </style>
</head>
<body>
    <div class="container py-4">
        <h1 class="mb-4 text-center text-primary fw-bold">Calculator Panel CLT</h1>
        
        <div class="row">
            <!-- INPUT SECTION -->
            <div class="col-lg-4 mb-4">
                <div class="card p-4 h-100">
                    <h4 class="mb-3">Input Parameter</h4>
                    
                    <div class="mb-3">
                        <label class="form-label">Analytical Method</label>
                        <select id="method-select" class="form-select">
                            <option value="shear">Shear Analogy</option>
                            <option value="gamma">Gamma Method</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Total Layers</label>
                        <input type="number" id="layer-count" class="form-control" value="5" min="3" max="9" step="2">
                        <div class="form-text text-muted" id="layer-help">Ganjil, 3 sampai 9 (Simetris).</div>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Length (m)</label>
                        <input type="number" id="panel-length" class="form-control" value="5">
                    </div>
                    
                    <hr>
                    <h5 class="mb-3">Layer Settings</h5>
                    <div id="layer-container">
                        <!-- Dynamic Layer Inputs Go Here -->
                    </div>
                    
                    <button id="btn-calculate" class="btn btn-primary w-100 mt-3 p-2 fw-bold">Calculate Properties</button>
                    
                    <div id="error-alert" class="alert alert-danger mt-3 d-none" role="alert"></div>
                </div>
            </div>

            <!-- OUTPUT SECTION -->
            <div class="col-lg-8">
                <div class="card p-4 h-100">
                    <h4 class="mb-3">Output Result</h4>
                    
                    <div id="output-container" class="d-none">
                        <div class="table-responsive">
                            <table class="table table-bordered text-center align-middle" id="result-table">
                                <thead id="result-thead">
                                    <!-- Dynamic Headers -->
                                </thead>
                                <tbody id="result-tbody">
                                    <!-- Dynamic Rows -->
                                </tbody>
                                <tfoot id="result-tfoot">
                                    <!-- Dynamic Footer (Sum) -->
                                </tfoot>
                            </table>
                        </div>
                        
                        <div class="mt-4 p-3 bg-light rounded text-center border">
                            <h5 class="text-secondary mb-1">Bending Stiffness (EI_eff)</h5>
                            <div class="result-highlight" id="final-ei">0 N-mm²/m</div>
                        </div>
                    </div>
                    
                    <div id="empty-state" class="text-center text-muted py-5">
                        <p>Silakan isi parameter dan klik "Calculate Properties" untuk melihat hasil.</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Script dependencies (OOP Types) -->
    <script src="type/material-grade-type.js"></script>
    <script src="type/clt-layer-type.js"></script>
    <script src="type/clt-layup-type.js"></script>
    <script src="type/clt-layer-properties-type.js"></script>
    <script src="type/panel-properties-type.js"></script>
    <script src="calculation/panel-properties.js"></script>

    <!-- Main Logic -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="calculator.js"></script>
</body>
</html>
