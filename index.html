<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator Panel</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
    <div class="container py-4">

        <h2 class="text-center mb-4 fw-bold text-primary">
            CLT Panel Calculator
        </h2>
        <div class="row g-3">

            <div class="col-md-4">
                <label class="form-label">Analytical Method</label>
                <select id="method"
                    class="form-select"
                    onchange="changeMethod()">
        
                    <option value="shear">Shear Analogy</option>
                    <option value="gamma">Gamma Method</option>
        
                </select>
            </div>
        
            <div class="col-md-4">
                <label class="form-label">Total Layers</label>
                <select
                    id="layerCount"
                    class="form-select"
                    onchange="generateLayerInput()">
        
                    <option>3</option>
                    <option>5</option>
                    <option>7</option>
                    <option>9</option>
        
                </select>
            </div>
        
            <div class="col-md-4">
                <label class="form-label">Grade Name</label>
                <input
                    id="gradeName"
                    class="form-control"
                    value="MGP10">
            </div>
        
        </div>

        <div class="row g-3 mt-2">

            <div class="col-md-3">
                <label class="form-label">Ex (MPa)</label>
                <input
                    id="Ex"
                    type="number"
                    class="form-control"
                    value="10000">
            </div>
        
            <div class="col-md-3">
                <label class="form-label">Ey (MPa)</label>
                <input
                    id="Ey"
                    type="number"
                    class="form-control"
                    value="500">
            </div>
        
            <div class="col-md-3">
                <label class="form-label">G (MPa)</label>
                <input
                    id="G"
                    type="number"
                    class="form-control"
                    value="650">
            </div>
        
            <div class="col-md-3">
                <label class="form-label">Density</label>
                <input
                    id="density"
                    type="number"
                    class="form-control"
                    value="50">
            </div>
        
            <div class="row g-3 mt-2">

                <div class="col-md-6">
                    <label class="form-label">Beff (mm)</label>
                    <input
                        id="width"
                        type="number"
                        class="form-control"
                        value="1000">
                </div>
            
                <div class="col-md-6">
                    <label class="form-label">Length (mm)</label>
                    <input
                        id="length"
                        type="number"
                        class="form-control"
                        value="5000">
                </div>
            
            </div>
    
        <hr>
    
        <div id="layerInput"></div>
    
        <div class="text-left mt-4">
            <button
                class="btn btn-primary px-4 py-2"
                onclick="calculatePanel()">
        
                Calculate
        
            </button>
        </div>
    
        <hr>
    
        <div id="output" class="mt-4 d-none">

            <div class="card shadow">
        
                <div class="card-body">
        
                    <h3
                        id="resultMethod"
                        class="text-center fw-bold mb-4">
                    </h3>
        
                    <div class="row mb-3">
        
                        <div class="col-md-6">
                            <h5>
                                Total Thickness :
                                <span id="totalThickness"></span>
                            </h5>
                            <h5>
                                EIeff :
                                <span id="eiResult"></span>
                            </h5>
                        </div>
    
        
                    </div>
        
                    <div class="table-responsive">
        
                        <table
                            class="table table-bordered table-striped table-hover text-center">
        
                            <thead class="table-dark">
        
                                <tr>
        
                                    <th>Layer</th>
                                    <th>Orientation</th>
                                    <th>Thickness</th>
                                    <th>Area</th>
                                    <th>Inertia</th>
                                    <th>ai</th>
                                    <th>E</th>
                                    <th>EI</th>
                                    <th>EA²</th>
        
                                </tr>
        
                            </thead>
        
                            <tbody id="resultTable">
        
                            </tbody>
        
                        </table>
        
                    </div>
        
                    <div id="extraResult"></div>
        
                </div>
        
            </div>
        
        </div>
    
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="type/material-grade-type.js"></script>
    <script src="type/clt-layer-properties-type.js"></script>
    <script src="type/clt-layer-type.js"></script>
    <script src="type/clt-layup-type.js"></script>
    <script src="type/panel-properties-type.js"></script>

    <script src="calculation/panel-properties.js"></script>

    <script src="calculator.js"></script>

</body>

</html>
