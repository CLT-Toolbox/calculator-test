<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator Panel</title>

    <!-- CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container py-5">
        <div class="border-bottom pb-3 mb-4">
            <h1 class="fw-bold text-secondary">Calculator Panel</h1>
        </div>
        <!-- Write Input On Here -->

        <div class="card shadow-sm mb-4">
            <div class="card-header bg-secondary text-white fw-semibold">Global Configuration</div>
            <div class="card-body">
                <div class="row g-3">
                    <div class="col-md-3">
                        <label class="form-label fw-medium">Analytical Method</label>
                        <select id="method" class="form-select" onchange="changeMethod()">
                            <option value="shear">Shear Analogy</option>
                            <option value="gamma">Gamma Method</option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label fw-medium">Total Layers</label>
                        <select id="layerCount" class="form-select" onchange="generateLayerInput()">
                            <option>3</option>
                            <option>5</option>
                            <option>7</option>
                            <option>9</option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-medium">Grade Name</label>
                        <input id="gradeName" class="form-control" value="MGP10">
                    </div>
                </div>

                <div class="row g-3 mt-1">
                    <div class="col-md-3">
                        <label class="form-label text-muted small">Ex (MPa)</label>
                        <input id="Ex" type="number" class="form-control" value="10000">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label text-muted small">Ey (MPa)</label>
                        <input id="Ey" type="number" class="form-control" value="500">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label text-muted small">G (MPa)</label>
                        <input id="G" type="number" class="form-control" value="650">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label text-muted small">Density</label>
                        <input id="density" type="number" class="form-control" value="50">
                    </div>
                </div>

                <div class="row g-3 mt-1 pt-2 border-top">
                    <div class="col-md-6">
                        <label class="form-label fw-medium">Beff / Width (mm)</label>
                        <input id="width" type="number" class="form-control" value="1000">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-medium">Length (mm)</label>
                        <input id="length" type="number" class="form-control" value="5000">
                    </div>
                </div>
            </div>
        </div>
    
        <div id="layerInput" class="mb-4"></div>
    
        <div class="mb-5">
            <button class="btn btn-success px-5 py-2 fw-semibold" id="btn-calculate">
                Calculate
            </button>
        </div>
    
        <div id="output" class="mt-4 d-none">
            <div class="card border-primary shadow-sm">
                <div class="card-header bg-primary text-white">
                    <h4 id="resultMethod" class="mb-0 fw-bold py-1"></h4>
                </div>
                <div class="card-body">
                    <div class="row p-2 mb-3 bg-light rounded mx-1">
                        <div class="col-md-6">
                            <span class="text-muted d-block small">Total Thickness</span>
                            <span id="totalThickness" class="fs-4 fw-bold text-dark"></span>
                        </div>
                        <div class="col-md-6 border-start">
                            <span class="text-muted d-block small">EIeff Result</span>
                            <span id="eiResult" class="fs-4 fw-bold text-primary"></span>
                        </div>
                    </div>
        
                    <div class="table-responsive">
                        <table class="table table-sm table-hover table-bordered align-middle text-center">
                            <thead class="table-light text-secondary border-bottom">
                                <tr>
                                    <th>Layer</th>
                                    <th>Orientation</th>
                                    <th>Thickness (mm)</th>
                                    <th>Area</th>
                                    <th>Inertia</th>
                                    <th>ai</th>
                                    <th>E</th>
                                    <th>EI</th>
                                    <th>EA²</th>
                                </tr>
                            </thead>
                            <tbody id="resultTable" class="table-group-divider">
                            </tbody>
                        </table>
                    </div>
        
                    <div id="extraResult" class="mt-3"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Script -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="type/material-grade-type.js"></script>
    <script src="type/clt-layer-properties-type.js"></script>
    <script src="type/clt-layer-type.js"></script>
    <script src="type/clt-layup-type.js"></script>
    <script src="type/panel-properties-type.js"></script>
    <script src="calculation/panel-properties.js"></script>
    <script src="calculator.js"></script>
</body>
</html>
